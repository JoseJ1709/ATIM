server {
    listen 80;
    server_name localhost;

    # Servir OHIF Viewer
    location / {
        proxy_pass http://ohif-viewer:80;
        proxy_set_header Host $host;
    }

    # Sobreescribir app-config.js con nuestra configuración
    location /app-config.js {
        alias /usr/share/nginx/html/app-config.js;
    }

    # Proxy a Orthanc DICOMweb con CORS y autenticación
    location /dicom-web/ {
        proxy_pass http://orthanc:8042/dicom-web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization "Basic YXRpbTphdGltMjAyNnNlY3VyZQ==";

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Proxy a Orthanc WADO con autenticación
    location /wado {
        proxy_pass http://orthanc:8042/wado;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Basic YXRpbTphdGltMjAyNnNlY3VyZQ==";

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }
}